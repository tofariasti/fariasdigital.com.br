<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="fd-grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#007BFF"/>
    </linearGradient>
    <linearGradient id="accent-text" x1="0" y1="0" x2="420" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cta-grad" x1="0" y1="0" x2="280" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#007BFF"/>
    </linearGradient>
    <radialGradient id="orb-blue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-accent" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#007BFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#007BFF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="rgba(59,130,246,0.07)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1020" cy="100" r="220" fill="url(#orb-blue)"/>
  <circle cx="140" cy="540" r="240" fill="url(#orb-accent)"/>
  <circle cx="900" cy="480" r="120" fill="url(#orb-blue)" opacity="0.5"/>

  <rect x="64" y="120" width="480" height="390" rx="24" fill="rgba(15,21,36,0.72)" stroke="rgba(59,130,246,0.22)" stroke-width="1.5"/>

  <g transform="translate(96, 156)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="rgba(59,130,246,0.1)" stroke="url(#fd-grad)" stroke-width="1.5"/>
    <text x="26" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="-0.06em" fill="url(#fd-grad)">FD</text>
    <text x="68" y="34" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.03em" fill="#f1f5f9">Farias</text>
    <text x="168" y="34" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.03em" fill="url(#accent-text)">Digital</text>
    <text x="68" y="62" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.16em" fill="#94a3b8">TECNOLOGIA · ESTRATÉGIA · RESULTADOS</text>
  </g>

  <text x="96" y="280" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="700" letter-spacing="-0.03em" fill="#f1f5f9">Experiências digitais</text>
  <text x="96" y="340" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.03em" fill="url(#accent-text)">que convertem.</text>
  <text x="96" y="395" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#94a3b8">Sites · Landing + Painel · E-commerce · WhatsApp</text>

  <rect x="96" y="430" width="220" height="52" rx="26" fill="url(#cta-grad)" filter="url(#glow)"/>
  <text x="206" y="462" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">fariasdigital.com.br</text>

  <text x="96" y="520" font-family="Inter, system-ui, sans-serif" font-size="17" font-weight="500" fill="#64748b">MEI · Nota Fiscal · Orçamento sem compromisso</text>

  <g transform="translate(620, 180)" opacity="0.95">
    <rect x="0" y="0" width="500" height="300" rx="18" fill="#0f1524" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
    <rect x="0" y="0" width="500" height="36" rx="18" fill="rgba(0,0,0,0.45)"/>
    <circle cx="20" cy="18" r="5" fill="#ef4444"/>
    <circle cx="38" cy="18" r="5" fill="#eab308"/>
    <circle cx="56" cy="18" r="5" fill="#22c55e"/>
    <rect x="120" y="10" width="260" height="16" rx="8" fill="rgba(255,255,255,0.05)"/>
    <rect x="32" y="72" width="280" height="12" rx="6" fill="url(#fd-grad)" opacity="0.55"/>
    <rect x="32" y="96" width="200" height="10" rx="5" fill="rgba(148,163,184,0.25)"/>
    <rect x="32" y="140" width="200" height="100" rx="12" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)"/>
    <rect x="252" y="140" width="200" height="100" rx="12" fill="rgba(147,51,234,0.08)" stroke="rgba(147,51,234,0.2)"/>
    <rect x="32" y="260" width="420" height="10" rx="5" fill="rgba(148,163,184,0.18)"/>
  </g>
